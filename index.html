<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Chat</title>
</head>

<body>
    <!--
        Container per poter usare display flex
    -->
    <div class="container-wrapper">
        <!-- 
            Sidebar
        -->
        <nav class="sidebar">
            <ul class="sidebar-list">
                <li>
                    <a href="#">
                        <img src="./img/logo.webp" alt="Logo discord">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server arte.png" alt="Server arte">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server_boolean.png" alt="Server Boolean">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server_italia.png" alt="Server Italia">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server_nintendo.png" alt="Server Nintendo">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server_javascript.png" alt="Server JavaScript">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/server_pokemon.png" alt="Server Pokemon">
                    </a>
                </li>
            </ul>
        </nav>
        <!--
            Main
        -->
        <main class="container-main">
            <!--
                Lista chat
            -->
            <section class="chat-list">
                <header class="container-header">
                    <h2 class="chat-title">Messaggi</h2>
                </header>
                <div class="container-list">
                    <ul class="chat-list">
                        <li>
                            <a href="#">
                                <img src="./img/profile1.webp" alt="Profilo 1">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile2.webp" alt="Profilo 2">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile3.webp" alt="Profilo 3">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile4.webp" alt="Profilo 4">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile5.webp" alt="Profilo 5">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile6.webp" alt="Profilo 6">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile7.webp" alt="Profilo 7">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile8.webp" alt="Profilo 8">
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img src="./img/profile9.webp" alt="Profilo 9">
                            </a>
                        </li>
                    </ul>
                </div>
            </section>
        </main>
        <footer>
            <!--
                Navbar
            -->
            <nav class="navbar"></nav>
        </footer>
    </div>
</body>

</html>
